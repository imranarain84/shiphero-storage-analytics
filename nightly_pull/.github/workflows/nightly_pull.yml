name: Nightly Inventory Pull

on:
  schedule:
    - cron: '0 7 * * 1-6'  # 2am EST Mon-Sat (after 1am product upload)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Pull mode (nightly or weekly)'
        required: false
        default: 'nightly'

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r nightly_pull/requirements.txt

      - name: Run nightly pull
        working-directory: nightly_pull
        env:
          SHIPHERO_TOKEN: ${{ secrets.SHIPHERO_TOKEN }}
          SPACES_KEY: ${{ secrets.SPACES_KEY }}
          SPACES_SECRET: ${{ secrets.SPACES_SECRET }}
          SPACES_BUCKET: ${{ secrets.SPACES_BUCKET }}
          SPACES_REGION: ${{ secrets.SPACES_REGION }}
          PULL_MODE: ${{ github.event.inputs.mode || 'nightly' }}
        run: python nightly_pull.py
